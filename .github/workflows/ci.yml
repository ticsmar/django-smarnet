name: CI

on:
    pull_request:
    push:
        branches:
            - master

jobs:
    quality:
        runs-on: ubuntu-latest
        env:
            PYTHONPATH: src

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - run: pip install -r requirements.txt -r requirements-dev.txt

            - run: ruff check .

            - run: ruff format --check .

            - run: mypy .

            - run: lint-imports

            - run: pytest
