version: "3.9"

services:
    web:
        build: .
        container_name: smar-license-api
        working_dir: /app/backend
        ports:
            - "8000:8000"
        env_file:
            - backend/.env
        environment:
            - ORACLE_HOME=/opt/oracle/instantclient_21_13
            - LD_LIBRARY_PATH=/opt/oracle/instantclient_21_13
            - ORACLE_CLIENT_PATH=/opt/oracle/instantclient_21_13
        extra_hosts:
            - "dbdesenv:192.168.1.168"
        volumes:
            - .:/app
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            args:
                VITE_DJANGO_API_URL: http://localhost:8000/api
        container_name: smar-license-frontend
        ports:
            - "3000:8080"
        restart: unless-stopped
